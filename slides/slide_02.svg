<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad2)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="#e94560"/>

  <!-- Header divider -->
  <rect x="100" y="128" width="1080" height="2" fill="#1e3a5f"/>

  <!-- Column divider -->
  <rect x="640" y="148" width="2" height="530" fill="#1e3a5f"/>

  <!-- Slide title -->
  <foreignObject x="100" y="38" width="1080" height="72">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:44px;font-weight:bold;color:#ffffff;font-family:Arial,'Noto Sans JP',sans-serif;">課題と解決アプローチ</div>
  </foreignObject>

  <!-- Left column label -->
  <foreignObject x="100" y="148" width="480" height="44">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:17px;font-weight:bold;color:#e94560;font-family:Arial,sans-serif;letter-spacing:0.12em;">PROBLEM</div>
  </foreignObject>

  <!-- Left column content -->
  <foreignObject x="100" y="200" width="520" height="466">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:20px;color:#a8b2d8;font-family:Arial,'Noto Sans JP',sans-serif;line-height:2;word-break:break-word;">▸ AIが絶対座標で配置すると、テキスト追加でレイアウト崩壊<br/>▸ コード直接編集は直感的でなくミスが起きやすい<br/>▸ SVG→PDF変換でフォントズレ・文字切れが頻発</div>
  </foreignObject>

  <!-- Right column label -->
  <foreignObject x="660" y="148" width="520" height="44">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:17px;font-weight:bold;color:#34d399;font-family:Arial,sans-serif;letter-spacing:0.12em;">SOLUTION</div>
  </foreignObject>

  <!-- Right column content -->
  <foreignObject x="660" y="200" width="520" height="466">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:20px;color:#a8b2d8;font-family:Arial,'Noto Sans JP',sans-serif;line-height:2;word-break:break-word;">✓ foreignObject + CSSで自動改行・可変レイアウト<br/>✓ WebviewでGUI編集、コードに自動同期<br/>✓ PuppeteerのChromiumでWYSIWYG PDF出力</div>
  </foreignObject>

  <!-- Slide number -->
  <foreignObject x="1160" y="690" width="100" height="24">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:15px;color:#ffffff;opacity:0.35;font-family:Arial,sans-serif;text-align:right;">2 / 2</div>
  </foreignObject>
</svg>
